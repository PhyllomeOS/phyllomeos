# Recipe Manifest for Phyllome OS
# Define all recipe variants using generators from recipe_templates.yaml
# Edit this file to add new variants, then run: make generate-recipes

recipes:
  # Install variants - desktop
  - name: install
    variants:
      - name: desktop
        version: 43
        desktop: gnome
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        initial-setup: server
      - name: desktop
        version: 43
        desktop: gnome
        storage: standard
        bootloader: grub
        security: devel
        hardware-support: true
        initial-setup: server
      - name: desktop
        version: 43
        desktop: labwc
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        initial-setup: server
      - name: desktop
        version: rawhide
        desktop: gnome
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        initial-setup: server
      - name: desktop
        version: rawhide
        desktop: gnome
        storage: encrypted
        bootloader: grub
        security: secure
        hardware-support: true
        initial-setup: server

  # Install variants - server (minimal, no desktop packages)
  - name: install
    variants:
      - name: server
        version: 43
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        initial-setup: server
      - name: server
        version: 43
        storage: standard
        bootloader: grub
        security: devel
        hardware-support: true
        initial-setup: server
      - name: server
        version: rawhide
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        initial-setup: server
      - name: server
        version: rawhide
        storage: standard
        bootloader: grub
        security: devel
        hardware-support: true
        initial-setup: server

  # Install variants - hypervisor
  - name: install
    variants:
      - name: hypervisor
        version: rawhide
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        hypervisor: true
        hypervisor-type:
          - amdcpu
      - name: hypervisor
        version: rawhide
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        hypervisor: true
        hypervisor-type:
          - intelcpu
      - name: hypervisor
        version: rawhide
        storage: standard
        bootloader: grub
        security: secure
        hardware-support: true
        hypervisor: true
        hypervisor-type:
          - intelcpu
          - intelgpu

  # Live variants - desktop
  - name: live
    variants:
      - name: desktop
        version: rawhide
        security: secure
        hardware-support: true

  # Live variants - server
  - name: live
    variants:
      - name: server
        version: rawhide
        security: secure
        hardware-support: true
